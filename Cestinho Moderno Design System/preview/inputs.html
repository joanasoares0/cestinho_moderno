<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-page); display: grid; grid-template-columns: 1fr 1fr; gap: 24px 32px; min-height: 220px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .lbl { font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--cm-ink); letter-spacing: .04em; }
  .inp { font-family: var(--font-body); font-size: 15px; padding: 12px 14px; border: 1.5px solid var(--cm-line); border-radius: var(--r-sm); background: var(--cm-paper); color: var(--fg-1); transition: border-color 140ms; outline: none; }
  .inp::placeholder { color: var(--fg-4); }
  .inp.focus { border-color: var(--cm-iris); box-shadow: 0 0 0 4px rgba(167,155,217,.25); }
  .help { font-family: var(--font-body); font-size: 12px; color: var(--fg-3); }
  .help b { font-weight: 700; }
  .help svg { color: var(--cm-iris); }
  .chip { font-family: var(--font-body); font-size: 13px; font-weight: 600; padding: 7px 14px; border-radius: var(--r-pill); background: var(--cm-lavender-30); color: var(--cm-ink); display: inline-flex; align-items: center; gap: 6px; }
  .chip.active { background: var(--cm-iris); color: #fff; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .disclaimer { display: flex; align-items: flex-start; gap: 8px; margin-top: 12px; padding: 10px 14px; background: var(--cm-lavender-10); border-radius: var(--r-sm); font-family: var(--font-body); font-size: 12.5px; color: var(--fg-2); line-height: 1.45; }
  .disclaimer svg { color: var(--cm-iris); flex-shrink: 0; margin-top: 2px; }
  .disclaimer b { color: var(--cm-ink); font-weight: 700; }
</style>
</head>
<body>
  <div class="field">
    <label class="lbl">Nome</label>
    <input class="inp" placeholder="Ex: Maria Sousa">
    <span class="help">Como devemos tratá-lo?</span>
  </div>
  <div class="field">
    <label class="lbl">Morada de recolha</label>
    <input class="inp focus" value="Rua das Flores 12, Porto">
    <span class="help"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px; margin-right:2px;"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 1 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>Recolha disponível em <b style="color:var(--cm-iris)">Porto</b>, <b style="color:var(--cm-iris)">Matosinhos</b> e <b style="color:var(--cm-iris)">Maia</b></span>
  </div>
  <div class="field" style="grid-column: 1 / -1;">
    <label class="lbl">Serviço pretendido</label>
    <div class="row">
      <span class="chip active">Engomadoria</span>
      <span class="chip">Lavagem</span>
      <span class="chip">Arranjos</span>
      <span class="chip">Pack camisas</span>
      <span class="chip">Recolha 24h</span>
      <span class="chip">Outros</span>
    </div>
    <div class="disclaimer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
      <span>Este pedido é uma submissão preliminar — <b>entraremos em contacto</b> para afinar detalhes e confirmar o agendamento.</span>
    </div>
  </div>
</body>
</html>
