<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Iconografia</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--bg-page); min-height: 240px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 14px; }
  .ico { background: var(--cm-paper); border-radius: var(--r-sm); aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; box-shadow: var(--sh-1); }
  .ico svg { width: 22px; height: 22px; stroke: var(--cm-iris); fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
  .ico span { font-family: var(--font-body); font-size: 9.5px; color: var(--fg-3); letter-spacing: .04em; text-align: center; line-height: 1.2; padding: 0 4px; }
  .note { font-family: var(--font-body); font-size: 12px; color: var(--fg-3); margin-top: 16px; }
  .note b { color: var(--cm-iris); }
</style>
</head>
<body>
  <div class="grid">
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M6 4h12l-2 16H8L6 4z"/><path d="M6 4l2-2h8l2 2"/></svg><span>cesto</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span>horários</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M12 4a2 2 0 1 0 2 2"/><path d="M12 6v2l-9 6h18l-9-6"/></svg><span>recolha</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M20.5 13.5C20.5 18 16.5 21 12 21s-8.5-3-8.5-7.5S12 3 12 3s8.5 6 8.5 10.5z"/></svg><span>gota</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M6 4h3a3 3 0 0 0 6 0h3l3 3-3 3-2-1v11H8V9l-2 1-3-3z"/></svg><span>cuidado têxtil</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M5 3h14v18H5z"/><path d="M9 7h6M9 11h6M9 15h4"/></svg><span>preçário</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.18 4.18 2 2 0 0 1 4.16 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg><span>contacto</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M3 22L21 4"/><path d="M16 4l4 4"/><path d="M3 22l1-5 4-1"/><path d="M12 13c-2 0-2 3 0 3"/></svg><span>arranjos costura</span></div>
  </div>
  <div class="note">Set funcional: <b>Lucide</b> via CDN — stroke 1.6px, cor `--cm-iris`. Marca própria: gota + cesto. Substituição flagged ao cliente.</div>
</body>
</html>
