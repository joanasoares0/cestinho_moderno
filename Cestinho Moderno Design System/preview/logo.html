<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--bg-page); display: flex; align-items: center; gap: 32px; min-height: 220px; }
  .lockup { display: flex; align-items: center; gap: 28px; flex: 1; }
  .lockup img { height: 110px; width: auto; }
  .vline { width: 1px; align-self: stretch; background: var(--cm-line); }
  .alt { display: flex; align-items: center; gap: 24px; }
  .chip-dark { background: var(--cm-ink); border-radius: var(--r-md); padding: 18px 22px; }
  .chip-dark img { height: 90px; filter: brightness(0) invert(1); opacity: .92; }
  .mono { display: flex; align-items: center; gap: 18px; }
  .mono img { height: 88px; }
  .label { font-family: var(--font-body); font-size: 11px; color: var(--fg-3); letter-spacing: .14em; text-transform: uppercase; margin-top: 10px; text-align: center; }
  .stack { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div class="lockup">
    <img src="../assets/cestinho-logo.png" alt="Cestinho Moderno wordmark">
  </div>
  <div class="vline"></div>
  <div class="stack">
    <div class="chip-dark"><img src="../assets/cestinho-logo.png" alt=""></div>
    <div class="label">Em fundo ink</div>
  </div>
  <div class="stack">
    <div class="mono"><img src="../assets/cesto-mark.svg" alt="Cesto"></div>
    <div class="label">Marca isolada</div>
  </div>
</body>
</html>
