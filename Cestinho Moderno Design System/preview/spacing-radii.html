<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Spacing & Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-page); display: grid; grid-template-columns: 1fr 1fr; gap: 36px; min-height: 220px; }
  .col h4 { margin: 0 0 14px; font-family: var(--font-body); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--fg-3); font-weight: 700; }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; align-items: center; gap: 12px; font-family: var(--font-body); font-size: 12px; color: var(--fg-2); }
  .bar { background: var(--cm-iris); height: 14px; border-radius: 3px; }
  .name { width: 50px; color: var(--fg-3); }
  .px { color: var(--fg-3); margin-left: auto; }
  .radii { display: flex; gap: 14px; align-items: flex-end; }
  .r { background: var(--cm-lavender-30); width: 64px; height: 64px; display: grid; place-items: center; font-family: var(--font-body); font-size: 12px; color: var(--cm-ink); font-weight: 700; }
</style>
</head>
<body>
  <div class="col">
    <h4>Escala de espaçamento (base 4)</h4>
    <div class="stack">
      <div class="row"><span class="name">s-1</span><div class="bar" style="width:4px"></div><span class="px">4</span></div>
      <div class="row"><span class="name">s-2</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
      <div class="row"><span class="name">s-3</span><div class="bar" style="width:12px"></div><span class="px">12</span></div>
      <div class="row"><span class="name">s-4</span><div class="bar" style="width:16px"></div><span class="px">16</span></div>
      <div class="row"><span class="name">s-5</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
      <div class="row"><span class="name">s-6</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
      <div class="row"><span class="name">s-7</span><div class="bar" style="width:48px"></div><span class="px">48</span></div>
      <div class="row"><span class="name">s-8</span><div class="bar" style="width:64px"></div><span class="px">64</span></div>
    </div>
  </div>
  <div class="col">
    <h4>Cantos arredondados</h4>
    <div class="radii">
      <div class="r" style="border-radius: var(--r-xs)">xs<br>6</div>
      <div class="r" style="border-radius: var(--r-sm)">sm<br>10</div>
      <div class="r" style="border-radius: var(--r-md)">md<br>16</div>
      <div class="r" style="border-radius: var(--r-lg)">lg<br>24</div>
      <div class="r" style="border-radius: var(--r-pill); width: 96px;">pill</div>
    </div>
    <h4 style="margin-top: 22px;">Sombras</h4>
    <div style="display:flex; gap:18px; padding: 6px 4px 14px;">
      <div style="width:70px; height:46px; background:var(--cm-paper); border-radius:var(--r-sm); box-shadow:var(--sh-1); display:grid; place-items:center; font-family:var(--font-body); font-size:11px; color:var(--fg-3);">sh-1</div>
      <div style="width:70px; height:46px; background:var(--cm-paper); border-radius:var(--r-sm); box-shadow:var(--sh-2); display:grid; place-items:center; font-family:var(--font-body); font-size:11px; color:var(--fg-3);">sh-2</div>
      <div style="width:70px; height:46px; background:var(--cm-paper); border-radius:var(--r-sm); box-shadow:var(--sh-3); display:grid; place-items:center; font-family:var(--font-body); font-size:11px; color:var(--fg-3);">sh-3</div>
    </div>
  </div>
</body>
</html>
