<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Posts Instagram</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: var(--bg-page); display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; min-height: 360px; }
  .ig { aspect-ratio: 1; border-radius: var(--r-md); padding: 18px; position: relative; overflow: hidden; box-shadow: var(--sh-2); display: flex; flex-direction: column; justify-content: space-between; }
  .ig .mark { font-family: var(--font-display); font-weight: 300; letter-spacing: .04em; text-transform: uppercase; font-size: 11px; display: inline-flex; align-items: baseline; gap: .12em; line-height: 1; }
  .ig .mark .scr { font-family: var(--font-script); font-weight: 400; font-size: 14px; text-transform: none; transform: translateY(.18em); }
  .eyebrow { font-family: var(--font-body); font-weight: 700; font-size: 8.5px; letter-spacing: .18em; text-transform: uppercase; margin-bottom: 4px; }

  /* Post 1 — pack promo on cream */
  .p1 { background: var(--cm-cream); color: var(--cm-ink); }
  .p1 .mark { color: var(--cm-iris); }
  .p1 .mark .scr { color: var(--cm-lavender); }
  .p1 .eyebrow { color: var(--cm-iris); }
  .p1 h2 { font-family: var(--font-display); font-weight: 500; font-size: 22px; line-height: 1.08; margin: 0; color: var(--cm-ink); }
  .p1 h2 .scr { font-family: var(--font-script); color: var(--cm-iris); font-size: 1.2em; font-weight: 400; }
  .p1 .price { font-family: var(--font-display); font-weight: 600; font-size: 40px; color: var(--cm-iris); line-height: 1; margin-top: 4px; }
  .p1 .pp { font-size: 9px; color: var(--fg-3); margin-top: 4px; }
  .p1::after { content: ""; position: absolute; right: -30px; top: -30px; width: 140px; height: 140px; background: url(../assets/pattern.svg) center/280px; opacity: .12; }

  /* Post 2 — quote on lavender-10 */
  .p2 { background: var(--cm-lavender-10); color: var(--cm-ink); }
  .p2 .mark { color: var(--cm-iris); }
  .p2 .mark .scr { color: var(--cm-lavender); }
  .p2 .body { display: flex; align-items: center; flex: 1; }
  .p2 h2 { font-family: var(--font-display); font-weight: 500; font-size: 19px; line-height: 1.15; margin: 0; text-wrap: balance; color: var(--cm-ink); }
  .p2 h2 .scr { font-family: var(--font-script); color: var(--cm-iris); font-size: 1.25em; font-weight: 400; }
  .p2 .foot { font-size: 8.5px; color: var(--fg-3); letter-spacing: .12em; text-transform: uppercase; }
  .p2::after { content: ""; position: absolute; left: -40px; bottom: -40px; width: 160px; height: 160px; background: url(../assets/pattern.svg) center/280px; opacity: .14; }

  /* Post 3 — B2B segment on sky-10 */
  .p3 { background: var(--cm-sky-10); color: var(--cm-ink); }
  .p3 .mark { color: var(--cm-iris); }
  .p3 .mark .scr { color: var(--cm-lavender); }
  .p3 .eyebrow { color: var(--cm-iris); }
  .p3 h2 { font-family: var(--font-display); font-weight: 500; font-size: 19px; line-height: 1.12; margin: 0; max-width: 11ch; color: var(--cm-ink); }
  .p3 h2 .scr { font-family: var(--font-script); color: var(--cm-iris); font-size: 1.25em; font-weight: 400; }
  .p3 .cta { display: inline-flex; align-items: center; gap: 6px; background: var(--cm-iris); color: #fff; padding: 7px 12px; border-radius: var(--r-pill); font-family: var(--font-body); font-weight: 700; font-size: 10px; align-self: flex-start; }
</style>
</head>
<body>
  <div class="ig p1">
    <div class="mark">Cestinho <span class="scr">moderno</span></div>
    <div>
      <div class="eyebrow">Pack engomadoria</div>
      <h2>60 peças passadas <span class="scr">com brio</span></h2>
      <div class="price">69€</div>
      <div class="pp">≈ 1,15€/peça · recolha em casa</div>
    </div>
  </div>

  <div class="ig p2">
    <div class="mark">Cestinho <span class="scr">moderno</span></div>
    <div class="body">
      <h2>O seu <span class="scr">tempo</span> vale mais do que roupa por lavar.</h2>
    </div>
    <div class="foot">@cestinhomoderno · Porto</div>
  </div>

  <div class="ig p3">
    <div class="mark">Cestinho <span class="scr">moderno</span></div>
    <div>
      <div class="eyebrow">Para clínicas</div>
      <h2>A sua clínica focada no que <span class="scr">importa</span>.</h2>
    </div>
    <div class="cta">+351 931 887 137 →</div>
  </div>
</body>
</html>
