<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Brand Illustration</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-soft); display: grid; grid-template-columns: 1fr 1fr; gap: 24px; min-height: 380px; }
  .frame { background: var(--cm-paper); border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; padding: 18px; box-shadow: var(--sh-1); }
  .frame img { max-width: 100%; max-height: 320px; }
  .pattern { background: var(--cm-cream); background-image: url(../assets/pattern.svg); background-size: 380px; background-position: center; }
</style>
</head>
<body>
  <div class="frame"><img src="../assets/cesto-mark.svg" alt="Cesto com lavandas"></div>
  <div class="frame pattern"></div>
</body>
</html>
