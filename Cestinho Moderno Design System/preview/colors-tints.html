<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Tints & Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); display: flex; flex-direction: column; gap: 18px; min-height: 260px; }
  .row { display: grid; grid-template-columns: 70px repeat(6, 1fr); gap: 10px; align-items: center; }
  .label { font-family: var(--font-body); font-size: 12px; color: var(--fg-3); letter-spacing: .08em; text-transform: uppercase; }
  .chip { aspect-ratio: 2.4 / 1; border-radius: var(--r-sm); display: flex; align-items: flex-end; padding: 8px 10px; font-family: var(--font-body); font-size: 10.5px; color: var(--fg-2); box-shadow: inset 0 0 0 1px rgba(9,16,64,.04); }
  .chip.dark { color: rgba(255,255,255,.86); }
</style>
</head>
<body>
  <div class="row">
    <div class="label">Iris</div>
    <div class="chip" style="background:var(--cm-iris-20)">20</div>
    <div class="chip dark" style="background:var(--cm-iris-70)">70</div>
    <div class="chip dark" style="background:var(--cm-iris)">100</div>
    <div class="chip dark" style="background:var(--cm-ink-90)">ink-90</div>
    <div class="chip" style="background:transparent"></div>
    <div class="chip" style="background:transparent"></div>
  </div>
  <div class="row">
    <div class="label">Lav · Sky</div>
    <div class="chip" style="background:var(--cm-lavender-10)">lav-10</div>
    <div class="chip" style="background:var(--cm-lavender-30)">lav-30</div>
    <div class="chip" style="background:var(--cm-lavender)">lav</div>
    <div class="chip" style="background:var(--cm-sky-10)">sky-10</div>
    <div class="chip" style="background:var(--cm-sky-30)">sky-30</div>
    <div class="chip" style="background:var(--cm-sky)">sky</div>
  </div>
  <div class="row">
    <div class="label">Neutros</div>
    <div class="chip" style="background:var(--cm-paper); box-shadow: inset 0 0 0 1px var(--cm-line)">paper</div>
    <div class="chip" style="background:var(--cm-cream)">cream</div>
    <div class="chip" style="background:var(--cm-mist)">mist</div>
    <div class="chip" style="background:var(--cm-line)">line</div>
    <div class="chip dark" style="background:var(--cm-soft)">soft</div>
    <div class="chip dark" style="background:var(--cm-muted)">muted</div>
  </div>
  <div class="row">
    <div class="label">Semântica</div>
    <div class="chip dark" style="background:var(--cm-success)">success</div>
    <div class="chip dark" style="background:var(--cm-warn)">warn 24h</div>
    <div class="chip dark" style="background:var(--cm-whatsapp)">whatsapp</div>
    <div class="chip" style="background:transparent"></div>
    <div class="chip" style="background:transparent"></div>
    <div class="chip" style="background:transparent"></div>
  </div>
</body>
</html>
