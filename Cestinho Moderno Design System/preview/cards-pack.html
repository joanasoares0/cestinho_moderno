<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Pack card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-soft); display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; min-height: 280px; }
  .pack { background: var(--cm-paper); border-radius: var(--r-lg); padding: 22px; box-shadow: var(--sh-2); display: flex; flex-direction: column; gap: 10px; position: relative; }
  .pack .eyebrow { font-family: var(--font-body); font-weight: 700; font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--cm-iris); }
  .pack .qty { font-family: var(--font-display); font-weight: 500; color: var(--cm-ink); font-size: 34px; line-height: 1; letter-spacing: -.01em; }
  .pack .qty small { font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--fg-3); letter-spacing: 0; }
  .pack .price { display: flex; align-items: baseline; gap: 4px; margin-top: 8px; }
  .pack .price .v { font-family: var(--font-display); font-weight: 600; font-size: 28px; color: var(--cm-iris); }
  .pack .price .c { font-family: var(--font-body); font-size: 13px; color: var(--fg-3); }
  .pack .pp { font-size: 12px; color: var(--fg-3); }
  .featured { background: var(--cm-ink); }
  .featured .eyebrow { color: var(--cm-lavender); }
  .featured .qty, .featured .qty small { color: #fff; }
  .featured .price .v { color: var(--cm-lavender); }
  .featured .price .c, .featured .pp { color: rgba(244,241,251,.7); }
  .badge { display: inline-flex; align-self: flex-start; margin-bottom: 4px; background: var(--cm-lavender); color: var(--cm-ink); font-family: var(--font-body); font-weight: 700; font-size: 10.5px; padding: 4px 10px; border-radius: var(--r-pill); letter-spacing: .1em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="pack">
    <div class="eyebrow">Pack engomadoria</div>
    <div class="qty">20<small> peças</small></div>
    <div class="price"><span class="v">29</span><span class="c">€</span></div>
    <div class="pp">≈ 1,45€/peça</div>
  </div>
  <div class="pack featured">
    <span class="badge">Mais popular</span>
    <div class="eyebrow">Pack engomadoria</div>
    <div class="qty">60<small> peças</small></div>
    <div class="price"><span class="v">69</span><span class="c">€</span></div>
    <div class="pp">≈ 1,15€/peça</div>
  </div>
  <div class="pack">
    <div class="eyebrow">Pack camisas</div>
    <div class="qty">12<small> camisas</small></div>
    <div class="price"><span class="v">20</span><span class="c">€</span></div>
    <div class="pp">≈ 1,67€/camisa</div>
  </div>
</body>
</html>
