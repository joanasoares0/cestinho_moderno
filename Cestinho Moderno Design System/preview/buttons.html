<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-page); display: flex; flex-direction: column; gap: 18px; min-height: 240px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .label { font-family: var(--font-body); font-size: 11px; color: var(--fg-3); letter-spacing: .14em; text-transform: uppercase; min-width: 80px; }
  .btn { font-family: var(--font-body); font-weight: 700; font-size: 15px; padding: 12px 22px; border-radius: var(--r-pill); border: 0; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 140ms var(--ease-soft); }
  .btn-primary { background: var(--cm-iris); color: #fff; box-shadow: var(--sh-2); }
  .btn-primary:hover { background: var(--cm-ink-90); transform: translateY(-1px); box-shadow: var(--sh-3); }
  .btn-secondary { background: var(--cm-paper); color: var(--cm-ink); box-shadow: inset 0 0 0 1.5px var(--cm-iris); }
  .btn-ghost { background: transparent; color: var(--cm-iris); }
  .btn-whatsapp { background: var(--cm-whatsapp); color: #fff; box-shadow: var(--sh-2); }
  .btn-sm { padding: 8px 16px; font-size: 13px; }
  .ico { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .ico-sm { width: 14px; height: 14px; }
  .arrow { margin-left: 2px; }
  .wa-glyph { width: 16px; height: 16px; fill: currentColor; }
</style>
</head>
<body>
  <div class="row">
    <span class="label">Primary</span>
    <button class="btn btn-primary">
      <svg class="ico" viewBox="0 0 24 24"><path d="M3 7h18M5 7l1.5 13h11L19 7M9 7V4h6v3"/></svg>
      Pedir orçamento
    </button>
    <button class="btn btn-primary">
      <svg class="ico" viewBox="0 0 24 24"><path d="M3 16h11l-1-8H4l-1 8zM14 11h4l3 5h-7"/><circle cx="6.5" cy="17.5" r="1.5"/><circle cx="17.5" cy="17.5" r="1.5"/></svg>
      Marcar recolha
      <svg class="ico arrow" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </button>
    <button class="btn btn-primary btn-sm">
      <svg class="ico ico-sm" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M8 14h4"/></svg>
      Ver packs
    </button>
  </div>
  <div class="row">
    <span class="label">Secondary</span>
    <button class="btn btn-secondary">
      <svg class="ico" viewBox="0 0 24 24"><path d="M5 3h14v18H5z"/><path d="M9 7h6M9 11h6M9 15h4"/></svg>
      Ver preçário
    </button>
    <button class="btn btn-secondary btn-sm">
      <svg class="ico ico-sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
      Saber mais
    </button>
    <button class="btn btn-ghost">
      <svg class="ico" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.18 4.18 2 2 0 0 1 4.16 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      Contactar
      <svg class="ico arrow" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </button>
  </div>
  <div class="row">
    <span class="label">WhatsApp</span>
    <button class="btn btn-whatsapp">
      <svg class="wa-glyph" viewBox="0 0 24 24"><path d="M17.5 14.4c-.3-.1-1.6-.8-1.9-.9-.3-.1-.4-.1-.6.1-.2.3-.7.9-.8 1-.2.2-.3.2-.6.1-.3-.2-1.2-.5-2.3-1.4-.9-.7-1.4-1.7-1.6-1.9-.2-.3 0-.4.1-.5.1-.1.3-.3.4-.5.1-.2.2-.3.3-.5.1-.2 0-.3-.1-.5-.1-.1-.6-1.4-.8-2-.2-.5-.4-.4-.6-.5h-.5c-.2 0-.5.1-.7.3-.2.3-.9.9-.9 2.2 0 1.3.9 2.6 1 2.7.1.2 1.8 2.8 4.5 3.9.6.3 1.1.4 1.5.5.6.2 1.2.2 1.6.1.5-.1 1.6-.6 1.8-1.3.2-.6.2-1.2.2-1.3-.1-.1-.2-.2-.5-.3zM12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.3 5L2 22l5.2-1.3c1.5.8 3.1 1.3 4.8 1.3 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>
      Falar no WhatsApp
    </button>
    <button class="btn btn-whatsapp btn-sm">
      <svg class="wa-glyph" style="width:14px; height:14px;" viewBox="0 0 24 24"><path d="M17.5 14.4c-.3-.1-1.6-.8-1.9-.9-.3-.1-.4-.1-.6.1-.2.3-.7.9-.8 1-.2.2-.3.2-.6.1-.3-.2-1.2-.5-2.3-1.4-.9-.7-1.4-1.7-1.6-1.9-.2-.3 0-.4.1-.5.1-.1.3-.3.4-.5.1-.2.2-.3.3-.5.1-.2 0-.3-.1-.5-.1-.1-.6-1.4-.8-2-.2-.5-.4-.4-.6-.5h-.5c-.2 0-.5.1-.7.3-.2.3-.9.9-.9 2.2 0 1.3.9 2.6 1 2.7.1.2 1.8 2.8 4.5 3.9.6.3 1.1.4 1.5.5.6.2 1.2.2 1.6.1.5-.1 1.6-.6 1.8-1.3.2-.6.2-1.2.2-1.3-.1-.1-.2-.2-.5-.3zM12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.3 5L2 22l5.2-1.3c1.5.8 3.1 1.3 4.8 1.3 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>
      +351 931 887 137
    </button>
  </div>
</body>
</html>
