<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Type — Display & Script</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 36px 40px; background: var(--bg-page); min-height: 280px; }
  .specimen { display: flex; align-items: baseline; gap: 6px; line-height: 1; }
  .cestinho { font-family: var(--font-display); font-weight: 300; font-size: 88px; letter-spacing: .04em; color: var(--cm-iris); text-transform: uppercase; }
  .moderno { font-family: var(--font-script); font-size: 88px; color: var(--cm-lavender); margin-left: -8px; transform: translateY(8px); }
  .meta { margin-top: 22px; display: flex; gap: 36px; font-family: var(--font-body); font-size: 12px; color: var(--fg-3); }
  .meta b { color: var(--fg-1); font-weight: 700; display: block; margin-bottom: 2px; letter-spacing: .04em; }
</style>
</head>
<body>
  <div class="specimen">
    <span class="cestinho">Cestinho</span>
    <span class="moderno">moderno</span>
  </div>
  <div class="meta">
    <div><b>Display</b>Quicksand · 300 · tracking .04em · UPPERCASE</div>
    <div><b>Script</b>Yellowtail · 400 · só para acentos</div>
    <div><b>Substituições</b>Pedir fontes originais ao cliente</div>
  </div>
</body>
</html>
