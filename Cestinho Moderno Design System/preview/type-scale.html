<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 36px; background: var(--bg-page); min-height: 320px; }
  .row { display: grid; grid-template-columns: 90px 1fr; align-items: baseline; padding: 10px 0; border-bottom: 1px solid var(--cm-line); }
  .row:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-body); font-size: 11px; color: var(--fg-3); letter-spacing: .12em; text-transform: uppercase; }
  .sample { line-height: 1.1; }
</style>
</head>
<body>
  <div class="row"><div class="tag">H1</div><div class="sample cm-h1" style="font-size:36px">Roupa cuidada, tempo recuperado</div></div>
  <div class="row"><div class="tag">H2</div><div class="sample cm-h2" style="font-size:26px">Pack de Engomadoria</div></div>
  <div class="row"><div class="tag">H3</div><div class="sample cm-h3">Recolha & entrega em casa</div></div>
  <div class="row"><div class="tag">Eyebrow</div><div class="sample cm-eyebrow">Lavandaria · Porto</div></div>
  <div class="row"><div class="tag">Body</div><div class="sample cm-body">Cuidamos de todo o ciclo da sua roupa — da recolha à entrega — com flexibilidade de horários.</div></div>
  <div class="row"><div class="tag">Small</div><div class="sample cm-small">Serviço urgente 24h disponível com acréscimo de 25%.</div></div>
</body>
</html>
