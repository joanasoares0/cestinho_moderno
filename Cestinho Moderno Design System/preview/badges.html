<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Badges & Tags</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-page); display: flex; flex-direction: column; gap: 14px; min-height: 180px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .label { font-family: var(--font-body); font-size: 11px; color: var(--fg-3); letter-spacing: .14em; text-transform: uppercase; min-width: 100px; }
  .badge { font-family: var(--font-body); font-weight: 700; font-size: 11px; padding: 5px 11px; border-radius: var(--r-pill); letter-spacing: .08em; text-transform: uppercase; display: inline-flex; align-items: center; gap: 5px; }
  .b-lav { background: var(--cm-lavender); color: var(--cm-ink); }
  .b-iris { background: var(--cm-iris); color: #fff; }
  .b-sky { background: var(--cm-sky-30); color: var(--cm-ink); }
  .b-warn { background: var(--cm-warn); color: #fff; }
  .b-success { background: var(--cm-success); color: #fff; }
  .b-outline { background: transparent; color: var(--cm-iris); box-shadow: inset 0 0 0 1.5px var(--cm-iris); }
  .b-ghost { background: var(--cm-iris-20); color: var(--cm-iris); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .9; }
</style>
</head>
<body>
  <div class="row">
    <span class="label">Status</span>
    <span class="badge b-success"><span class="dot"></span>Recolhida</span>
    <span class="badge b-sky"><span class="dot"></span>Em tratamento</span>
    <span class="badge b-lav"><span class="dot"></span>Pronta</span>
    <span class="badge b-warn"><span class="dot"></span>Urgente 24h</span>
  </div>
  <div class="row">
    <span class="label">Categoria</span>
    <span class="badge b-iris">Mais popular</span>
    <span class="badge b-outline">Novo</span>
    <span class="badge b-ghost">B2B</span>
    <span class="badge b-ghost">Empresas</span>
  </div>
</body>
</html>
