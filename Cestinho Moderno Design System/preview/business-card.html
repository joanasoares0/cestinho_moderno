<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Cartão de visita</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--cm-mist); display: flex; gap: 28px; min-height: 280px; align-items: center; justify-content: center; }
  .card { width: 320px; height: 200px; border-radius: 12px; padding: 24px; box-sizing: border-box; box-shadow: var(--sh-3); position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; }
  .front { background: var(--cm-cream); }
  .front::after { content: ""; position: absolute; right: -50px; bottom: -50px; width: 180px; height: 180px; background: url(../assets/pattern.svg) center/360px; opacity: .14; pointer-events: none; }
  .mark { font-family: var(--font-display); font-weight: 300; letter-spacing: .04em; text-transform: uppercase; font-size: 22px; color: var(--cm-iris); display: inline-flex; align-items: baseline; gap: .12em; }
  .mark .scr { font-family: var(--font-script); color: var(--cm-lavender); font-weight: 400; font-size: 28px; text-transform: none; transform: translateY(.18em); }
  .front .tag { font-family: var(--font-body); font-weight: 600; font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--cm-iris); }
  .front .svc { font-family: var(--font-body); font-size: 11px; color: var(--fg-3); }
  .front .svc strong { color: var(--cm-ink); font-weight: 600; }

  .back { background: var(--cm-ink); color: #fff; }
  .back::after { content: ""; position: absolute; inset: 0; background: url(../assets/pattern.svg) center/360px; opacity: .12; pointer-events: none; }
  .back .mark { color: rgba(255,255,255,.92); position: relative; z-index: 1; }
  .back .mark .scr { color: var(--cm-lavender); }
  .back .bottom { display: flex; align-items: flex-end; justify-content: space-between; gap: 14px; position: relative; z-index: 1; }
  .back .contact { font-family: var(--font-body); font-size: 11px; color: rgba(244,241,251,.85); line-height: 1.65; }
  .back .contact strong { font-weight: 700; color: #fff; }
  .back .qr-block { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
  .back .qr { width: 56px; height: 56px; background: #fff; border-radius: 6px; display: grid; place-items: center; }
  .back .qr svg { width: 44px; height: 44px; }
  .back .qr-label { font-family: var(--font-body); font-size: 8.5px; font-weight: 600; color: var(--cm-lavender); letter-spacing: .1em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="card front">
    <div>
      <span class="mark">Cestinho <span class="scr">moderno</span></span>
    </div>
    <div>
      <div class="tag" style="margin-bottom: 6px;">✨ Lavandaria · Engomadoria · Arranjos</div>
      <div class="svc"><strong>Recolha & entrega em casa</strong> · Porto</div>
    </div>
  </div>

  <div class="card back">
    <span class="mark">Cestinho <span class="scr">moderno</span></span>
    <div class="bottom">
      <div class="contact">
        <div><strong>+351 931 887 137</strong> · WhatsApp</div>
        <div>cestinhomoderno@gmail.com</div>
        <div>@cestinhomoderno · Porto</div>
      </div>
      <div class="qr-block">
        <div class="qr">
          <!-- decorative QR placeholder · scan to chat on WhatsApp -->
      <svg viewBox="0 0 21 21" fill="none">
        <rect x="0" y="0" width="6" height="6" fill="#091040"/>
        <rect x="15" y="0" width="6" height="6" fill="#091040"/>
        <rect x="0" y="15" width="6" height="6" fill="#091040"/>
        <rect x="2" y="2" width="2" height="2" fill="#fff"/>
        <rect x="17" y="2" width="2" height="2" fill="#fff"/>
        <rect x="2" y="17" width="2" height="2" fill="#fff"/>
        <rect x="8" y="2" width="2" height="2" fill="#091040"/>
        <rect x="11" y="2" width="2" height="2" fill="#091040"/>
        <rect x="8" y="5" width="2" height="2" fill="#091040"/>
        <rect x="2" y="8" width="2" height="2" fill="#091040"/>
        <rect x="5" y="8" width="2" height="2" fill="#091040"/>
        <rect x="8" y="8" width="2" height="2" fill="#091040"/>
        <rect x="11" y="8" width="2" height="2" fill="#091040"/>
        <rect x="14" y="8" width="2" height="2" fill="#091040"/>
        <rect x="17" y="8" width="2" height="2" fill="#091040"/>
        <rect x="8" y="11" width="2" height="2" fill="#091040"/>
        <rect x="14" y="11" width="2" height="2" fill="#091040"/>
        <rect x="8" y="14" width="2" height="2" fill="#091040"/>
        <rect x="11" y="14" width="2" height="2" fill="#091040"/>
        <rect x="14" y="14" width="2" height="2" fill="#091040"/>
        <rect x="17" y="14" width="2" height="2" fill="#091040"/>
        <rect x="8" y="17" width="2" height="2" fill="#091040"/>
        <rect x="11" y="17" width="2" height="2" fill="#091040"/>
        <rect x="14" y="17" width="2" height="2" fill="#091040"/>
      </svg>
    </div>
        <span class="qr-label">→ WhatsApp</span>
    </div>
    </div>
  </div>
</body>
</html>
